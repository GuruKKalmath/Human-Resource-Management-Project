<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h2>Onboard Employee</h2>

<div class="container">

    <div th:if="${errorMessage}"
         style="background:#fdecea;color:#962d22;padding:10px;border-radius:8px;margin-bottom:12px;"
         th:text="${errorMessage}"></div>

    <form th:action="@{/employees}"
          th:object="${employee}"
          method="post">

        <label for="empName">Name</label>
        <input id="empName" type="text" th:field="*{name}"/>
        <p th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}"
           style="color:red;"></p>

        <label for="empEmail">Email</label>
        <input id="empEmail" type="email" th:field="*{email}"/>
        <p th:if="${#fields.hasErrors('email')}"
           th:errors="*{email}"
           style="color:red;"></p>

        <label for="departmentId">Department</label>
        <select id="departmentId" th:field="*{department.id}" required>
            <option value="">Choose a department…</option>
            <option th:each="d : ${departments}"
                    th:value="${d.id}"
                    th:text="${d.name}"></option>
        </select>
        <p th:if="${#fields.hasErrors('department')}"
           th:errors="*{department}"
           style="color:red;"></p>

        <label for="empSalary">Salary</label>
        <input id="empSalary" type="number" step="0.01" th:field="*{salary}"/>
        <p th:if="${#fields.hasErrors('salary')}"
           th:errors="*{salary}"
           style="color:red;"></p>

        <label for="status">Status</label>
        <select id="status" th:field="*{status}">
            <option th:each="st : ${employeeStatuses}"
                    th:value="${st.name()}"
                    th:text="${st.name()}"></option>
        </select>
        <p th:if="${#fields.hasErrors('status')}"
           th:errors="*{status}"
           style="color:red;"></p>

        <p style="margin-top:14px;color:#5d6d7e;font-size:13px;line-height:1.4;">
            The human-readable Employee ID (<code style="padding:2px 5px;background:#eef2fb;border-radius:4px;">
            EMPxxx</code>) is generated securely on the HR service layer immediately after onboarding.
        </p>

        <button class="btn btn-secondary"
                style="margin-top:12px;"
                type="submit">Save Employee</button>
    </form>

    <div style="text-align:center;margin-top:14px;">
        <a class="btn" href="/employees/dashboard">Back to Dashboard</a>
        <a class="btn btn-secondary" th:href="@{/departments}">Department Directory</a>
    </div>

</div>

</body>
</html>

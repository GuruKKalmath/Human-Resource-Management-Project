<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #2c3e50 0%, #34495e 55%, #3d566e 100%);
        }

        .login-shell {
            width: min(420px, 92vw);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.22);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(160deg, #2c3e50 0%, #34495e 100%);
            color: #fff;
            text-align: center;
            padding: 22px 20px;
        }

        .login-header h1 {
            margin: 0;
            padding: 0;
            background: transparent;
            font-size: 1.45rem;
        }

        .login-header p {
            margin: 8px 0 0;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.95rem;
        }

        .login-body {
            padding: 24px 26px 28px;
        }

        .login-body label {
            display: block;
            font-size: 13px;
            color: #5d6d7e;
            margin-bottom: 4px;
        }

        .login-body input[type="text"],
        .login-body input[type="password"] {
            margin-bottom: 16px;
        }

        .login-body .btn {
            width: 100%;
            text-align: center;
            margin-top: 4px;
        }

        .alert {
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .alert-error {
            background: #fdecea;
            color: #c0392b;
            border: 1px solid #f5c6bf;
        }

        .alert-success {
            background: #e9f9ef;
            color: #219150;
            border: 1px solid #b7ebca;
        }
    </style>
</head>
<body>

<div class="login-shell">
    <header class="login-header">
        <h1>Employee Management</h1>
        <p>Sign in with your admin account</p>
    </header>

    <div class="login-body">
        <div class="alert alert-error" th:if="${param.error}">
            Invalid username or password.
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn" type="submit">Sign in</button>
        </form>
    </div>
</div>

</body>
</html>

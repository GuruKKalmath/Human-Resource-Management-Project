<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Employee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .pill-readonly {
            display: inline-flex;
            padding: 9px 12px;
            border-radius: 8px;
            background: #f4f6f9;
            border: 1px solid #d5dde6;
            font-family: monospace;
            font-weight: 600;
        }
        .muted {color:#607080;font-size:13px;line-height:1.4;margin:6px 0 14px;}
    </style>
</head>
<body>

<h2>Update Employee Profile</h2>

<div class="container">

    <div th:if="${errorMessage}"
         style="background:#fdecea;color:#962d22;padding:10px;border-radius:8px;margin-bottom:12px;"
         th:text="${errorMessage}"></div>

    <form th:action="@{/employees/update}"
          th:object="${employee}"
          method="post">

        <input type="hidden" th:field="*{id}"/>

        <label for="employeeIdCode">Human-readable Employee ID</label>
        <div id="employeeIdCode" class="pill-readonly" th:text="${employee.employeeId}">EMP001</div>
        <p class="muted">Service-assigned identifiers never change mid-tenure, keeping HR records deterministic.</p>

        <label for="empName">Name</label>
        <input id="empName" type="text" th:field="*{name}" />
        <p th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}"
           style="color:red"></p>

        <label for="empEmail">Email</label>
        <input id="empEmail" type="email" th:field="*{email}" />
        <p th:if="${#fields.hasErrors('email')}"
           th:errors="*{email}"
           style="color:red"></p>

        <label for="departmentId">Department</label>
        <select id="departmentId" th:field="*{department.id}">
            <option th:each="d : ${departments}"
                    th:value="${d.id}"
                    th:text="${d.name}"></option>
        </select>
        <p th:if="${#fields.hasErrors('department')}"
           th:errors="*{department}"
           style="color:red;"></p>

        <label for="empSalary">Salary</label>
        <input id="empSalary" type="number" step="0.01" th:field="*{salary}" />
        <p th:if="${#fields.hasErrors('salary')}"
           th:errors="*{salary}"
           style="color:red"></p>

        <label for="status">Employment Status</label>
        <select id="status" th:field="*{status}">
            <option th:each="st : ${employeeStatuses}"
                    th:value="${st.name()}"
                    th:text="${st.name()}"></option>
        </select>

        <button class="btn btn-secondary" style="margin-top:14px;"
                type="submit">Persist Changes</button>
    </form>

    <div style="text-align:center;margin-top:14px;">
        <a class="btn"
           href="/employees/dashboard">
            Cancel
        </a>
        <a class="btn btn-secondary"
           th:if="${employee.employeeId}"
           th:href="@{/employees/profile/{code}(code=${employee.employeeId})}">
            View Talent Profile
        </a>
    </div>

</div>

</body>
</html>
